// ========== 计划打卡模块 ==========
const HABITS_KEY = 'jxt_habits';
const DAY_NAMES = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
const HABITS = [
    '节制', '锻炼', '条理', '决心', '勤勉',
    '中庸', '整洁', '写作', '早睡', '阅读', '攻击性'
];

// 当前查看的周（周一的日期）
let planCurrentWeekStart = null;
// 时长追踪当前选中日期索引（0-6）
let planTimeDayIndex = 0;

// 获取ISO周编号（如 "2026-W27"）
function getWeekNumber(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function getWeekKey(date) {
    const y = date.getFullYear();
    const w = getWeekNumber(date);
    return `${y}-W${String(w).padStart(2, '0')}`;
}

// 获取某一天所在周的周一日期
function getWeekMonday(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day; // 周日视为-6天
    d.setDate(d.getDate() + diff);
    d.setHours(0, 0, 0, 0);
    return d;
}

// 获取周的日期范围标签（如 "7.1-7.7"）
function getWeekDateRange(mondayDate) {
    const start = new Date(mondayDate);
    const end = new Date(mondayDate);
    end.setDate(end.getDate() + 6);
    return `${start.getMonth() + 1}.${start.getDate()}-${end.getMonth() + 1}.${end.getDate()}`;
}

// 获取周的每一天日期字符串数组
function getWeekDates(mondayDate) {
    const dates = [];
    for (let i = 0; i < 7; i++) {
        const d = new Date(mondayDate);
        d.setDate(d.getDate() + i);
        dates.push(formatDate(d));
    }
    return dates;
}

// 读取所有习惯数据
function getAllHabitsData() {
    try {
        const data = localStorage.getItem(HABITS_KEY);
        return data ? JSON.parse(data) : {};
    } catch(e) {
        return {};
    }
}

// 保存所有习惯数据
function saveAllHabitsData(data) {
    try {
        localStorage.setItem(HABITS_KEY, JSON.stringify(data));
    } catch(e) {
        showToast('习惯数据保存失败');
    }
}

// 初始化计划页面
function initPlanView() {
    // 设置当前周为今天所在周
    planCurrentWeekStart = getWeekMonday(new Date());
    renderPlanView();
}

// 渲染计划页面
function renderPlanView() {
    if (!planCurrentWeekStart) return;

    const weekKey = getWeekKey(planCurrentWeekStart);
    const dates = getWeekDates(planCurrentWeekStart);
    const today = formatDate(new Date());

    // 更新周标签
    document.getElementById('weekLabelDisplay').textContent = getWeekDateRange(planCurrentWeekStart);

    // 读取该周数据
    const allData = getAllHabitsData();
    const weekData = allData[weekKey] || createEmptyWeekData(weekKey);

    // 填充周信息
    const virtues = weekData.virtues || {};
    document.getElementById('virtueHidden').value = virtues['潜龙勿用'] || '';
    document.getElementById('virtueName').value = virtues['德行'] || '';
    document.getElementById('weekGoal').value = virtues['目标'] || '';
    document.getElementById('weekPlan').value = virtues['计划'] || '';
    document.getElementById('planNotes').value = weekData.notes || '';

    // 渲染习惯打卡表格
    renderHabitTable(weekData, dates, today);

    // 渲染时长追踪日期选择
    renderTimeDaySelect(dates, today);

    // 加载时长数据
    loadTimeTrackingData(weekData);

    // 渲染统计
    renderPlanStats(weekData);
}

// 创建空周数据
function createEmptyWeekData(weekKey) {
    return {
        weekLabel: '',
        virtues: { '潜龙勿用': '', '德行': '', '目标': '', '计划': '' },
        checks: {},
        notes: '',
        timeTracking: {}
    };
}

// 渲染习惯打卡表格
function renderHabitTable(weekData, dates, today) {
    const checks = weekData.checks || {};

    // 渲染表头
    let headHtml = '<tr><th>习惯</th>';
    dates.forEach((dateStr, i) => {
        const isToday = dateStr === today;
        headHtml += `<th class="${isToday ? 'today-col' : ''}">${DAY_NAMES[i]}<br><span style="font-size:9px">${dateStr.slice(5)}</span></th>`;
    });
    headHtml += '</tr>';
    document.getElementById('habitTableHead').innerHTML = headHtml;

    // 渲染表体
    let bodyHtml = '';
    HABITS.forEach(habit => {
        const habitChecks = checks[habit] || [false, false, false, false, false, false, false];
        bodyHtml += '<tr>';
        bodyHtml += `<td>${habit}</td>`;
        habitChecks.forEach((checked, dayIdx) => {
            const isToday = dates[dayIdx] === today;
            bodyHtml += `<td class="${isToday ? 'today-col' : ''}">`;
            bodyHtml += `<button class="check-btn ${checked ? 'checked' : ''}" onclick="toggleHabit('${habit}', ${dayIdx})">${checked ? '✓' : ''}</button>`;
            bodyHtml += '</td>';
        });
        bodyHtml += '</tr>';
    });
    document.getElementById('habitTableBody').innerHTML = bodyHtml;
}

// 切换习惯打卡
function toggleHabit(habit, dayIdx) {
    const weekKey = getWeekKey(planCurrentWeekStart);
    const allData = getAllHabitsData();
    const weekData = allData[weekKey] || createEmptyWeekData(weekKey);

    if (!weekData.checks[habit]) {
        weekData.checks[habit] = [false, false, false, false, false, false, false];
    }

    weekData.checks[habit][dayIdx] = !weekData.checks[habit][dayIdx];
    allData[weekKey] = weekData;
    saveAllHabitsData(allData);

    // 刷新视图
    const dates = getWeekDates(planCurrentWeekStart);
    const today = formatDate(new Date());
    renderHabitTable(weekData, dates, today);
    renderPlanStats(weekData);
}

// 渲染时长追踪日期选择按钮
function renderTimeDaySelect(dates, today) {
    const container = document.getElementById('timeDaySelect');
    // 默认选中今天（如果在当前周内），否则选第一个
    const todayIdx = dates.indexOf(today);
    planTimeDayIndex = todayIdx >= 0 ? todayIdx : 0;

    let html = '';
    dates.forEach((dateStr, i) => {
        const isActive = i === planTimeDayIndex;
        const isToday = dateStr === today;
        html += `<button class="time-day-btn ${isActive ? 'active' : ''}" onclick="selectTimeDay(${i})">${DAY_NAMES[i]}${isToday ? '(今天)' : ''}</button>`;
    });
    container.innerHTML = html;
}

// 选择时长追踪日期
function selectTimeDay(idx) {
    planTimeDayIndex = idx;
    const dates = getWeekDates(planCurrentWeekStart);
    const today = formatDate(new Date());
    renderTimeDaySelect(dates, today);

    const weekKey = getWeekKey(planCurrentWeekStart);
    const allData = getAllHabitsData();
    const weekData = allData[weekKey] || createEmptyWeekData(weekKey);
    loadTimeTrackingData(weekData);
}

// 加载时长追踪数据
function loadTimeTrackingData(weekData) {
    const dates = getWeekDates(planCurrentWeekStart);
    const dateStr = dates[planTimeDayIndex];
    const timeData = (weekData.timeTracking || {})[dateStr] || {};

    document.getElementById('timePowerQuery').value = timeData.powerQuery || 0;
    document.getElementById('timeVocabulary').value = timeData.vocabulary || 0;
    document.getElementById('timeChat').value = timeData.chat || 0;
    document.getElementById('timeDrawing').value = timeData.drawing || 0;
    document.getElementById('timeGoingOut').value = timeData.goingOut || 0;

    updateTimeTotal();
}

// 更新时长合计
function updateTimeTotal() {
    const vals = [
        parseFloat(document.getElementById('timePowerQuery').value) || 0,
        parseFloat(document.getElementById('timeVocabulary').value) || 0,
        parseFloat(document.getElementById('timeChat').value) || 0,
        parseFloat(document.getElementById('timeDrawing').value) || 0,
        parseFloat(document.getElementById('timeGoingOut').value) || 0
    ];
    const total = vals.reduce((a, b) => a + b, 0);
    const pct = Math.min((total / 24) * 100, 100);
    document.getElementById('timeTotalBar').style.width = pct + '%';
    document.getElementById('timeTotalText').textContent = `${total}/24h`;
}

// 保存计划数据（输入变化时自动保存）
function savePlanData() {
    const weekKey = getWeekKey(planCurrentWeekStart);
    const allData = getAllHabitsData();
    const weekData = allData[weekKey] || createEmptyWeekData(weekKey);

    // 保存周信息
    weekData.virtues = {
        '潜龙勿用': document.getElementById('virtueHidden').value.trim(),
        '德行': document.getElementById('virtueName').value.trim(),
        '目标': document.getElementById('weekGoal').value.trim(),
        '计划': document.getElementById('weekPlan').value.trim()
    };

    // 保存备注
    weekData.notes = document.getElementById('planNotes').value.trim();

    // 保存时长追踪
    const dates = getWeekDates(planCurrentWeekStart);
    const dateStr = dates[planTimeDayIndex];
    if (!weekData.timeTracking) weekData.timeTracking = {};
    weekData.timeTracking[dateStr] = {
        powerQuery: parseFloat(document.getElementById('timePowerQuery').value) || 0,
        vocabulary: parseFloat(document.getElementById('timeVocabulary').value) || 0,
        chat: parseFloat(document.getElementById('timeChat').value) || 0,
        drawing: parseFloat(document.getElementById('timeDrawing').value) || 0,
        goingOut: parseFloat(document.getElementById('timeGoingOut').value) || 0
    };

    allData[weekKey] = weekData;
    saveAllHabitsData(allData);

    // 更新时长合计
    updateTimeTotal();
}

// 切换周（前进/后退）
function changeWeek(offset) {
    const newStart = new Date(planCurrentWeekStart);
    newStart.setDate(newStart.getDate() + offset * 7);
    planCurrentWeekStart = newStart;
    renderPlanView();
}

// 渲染周统计
function renderPlanStats(weekData) {
    const checks = weekData.checks || {};
    const container = document.getElementById('planStatsContent');

    let totalChecked = 0;
    let totalPossible = HABITS.length * 7;

    let html = '';
    HABITS.forEach(habit => {
        const habitChecks = checks[habit] || [false, false, false, false, false, false, false];
        const checked = habitChecks.filter(Boolean).length;
        const pct = Math.round((checked / 7) * 100);
        totalChecked += checked;

        html += `
            <div class="plan-stat-item">
                <span class="plan-stat-name">${habit}</span>
                <div class="plan-stat-bar-bg">
                    <div class="plan-stat-bar-fill" style="width:${pct}%"></div>
                </div>
                <span class="plan-stat-pct">${pct}%</span>
            </div>
        `;
    });
    container.innerHTML = html;

    // 总体完成率
    const overallPct = totalPossible > 0 ? Math.round((totalChecked / totalPossible) * 100) : 0;
    document.getElementById('planOverallRate').textContent = overallPct + '%';
}
</script>
